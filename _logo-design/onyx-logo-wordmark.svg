<?xml version="1.0" encoding="UTF-8"?>
<!--
  Onyx Studios — Wordmark only (no icon)
  Use for: text-only headers, footers, paragraph mentions.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" width="700" height="130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&amp;display=swap');
      .wordmark { font-family: 'Quicksand', 'Avenir Next', 'PingFang TC', sans-serif; font-weight: 700; }
    </style>
  </defs>
  <text x="350" y="92" class="wordmark" font-size="86"
        text-anchor="middle" fill="#000000" letter-spacing="2.5">Onyx Studios</text>
</svg>
